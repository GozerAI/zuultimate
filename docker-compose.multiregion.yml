version: "3.8"

services:
  zuultimate-us:
    build: .
    ports:
      - "8000:8000"
    environment:
      ZUUL_REGION: us
      ZUUL_SOVEREIGNTY_RING: us
      ZUUL_SECRET_KEY: ${ZUUL_SECRET_KEY:-multiregion-dev-secret-change-me}
      ZUUL_REDIS_URL: redis://redis:6379/0
      ZUUL_IDENTITY_DB_URL: sqlite+aiosqlite:///./data/us/identity.db
      ZUUL_CREDENTIAL_DB_URL: sqlite+aiosqlite:///./data/us/credentials.db
      ZUUL_SESSION_DB_URL: sqlite+aiosqlite:///./data/us/sessions.db
      ZUUL_TRANSACTION_DB_URL: sqlite+aiosqlite:///./data/us/transactions.db
      ZUUL_AUDIT_DB_URL: sqlite+aiosqlite:///./data/us/audit.db
      ZUUL_CRM_DB_URL: sqlite+aiosqlite:///./data/us/crm.db
    volumes:
      - us-data:/app/data/us
    depends_on:
      - redis

  zuultimate-eu:
    build: .
    ports:
      - "8001:8000"
    environment:
      ZUUL_REGION: eu
      ZUUL_SOVEREIGNTY_RING: eu
      ZUUL_SECRET_KEY: ${ZUUL_SECRET_KEY:-multiregion-dev-secret-change-me}
      ZUUL_REDIS_URL: redis://redis:6379/1
      ZUUL_IDENTITY_DB_URL: sqlite+aiosqlite:///./data/eu/identity.db
      ZUUL_CREDENTIAL_DB_URL: sqlite+aiosqlite:///./data/eu/credentials.db
      ZUUL_SESSION_DB_URL: sqlite+aiosqlite:///./data/eu/sessions.db
      ZUUL_TRANSACTION_DB_URL: sqlite+aiosqlite:///./data/eu/transactions.db
      ZUUL_AUDIT_DB_URL: sqlite+aiosqlite:///./data/eu/audit.db
      ZUUL_CRM_DB_URL: sqlite+aiosqlite:///./data/eu/crm.db
    volumes:
      - eu-data:/app/data/eu
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx-multiregion.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - zuultimate-us
      - zuultimate-eu

volumes:
  us-data:
  eu-data:
